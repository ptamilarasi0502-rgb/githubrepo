<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Downloader Test</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    body { font-family: Arial; background: #f0f0f0; margin: 0; padding: 16px; }
    .container { max-width: 100%; background: white; padding: 16px; border-radius: 8px; }
    h1 { color: #333; margin: 0 0 8px 0; }
    .output { background: #f5f5f5; border: 1px solid #ddd; padding: 12px; border-radius: 4px; margin: 12px 0; font-size: 13px; font-family: monospace; max-height: 300px; overflow-y: auto; white-space: pre-wrap; }
    input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
    button { width: 100%; padding: 12px; margin: 8px 0; background: #007bff; color: white; border: none; border-radius: 4px; font-size: 14px; font-weight: bold; cursor: pointer; }
    button:active { opacity: 0.8; }
    .status { padding: 8px; margin: 8px 0; border-radius: 4px; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .info { background: #d1ecf1; color: #0c5460; }
  </style>
</head>
<body>

<div class="container">
  <h1>📥 GitHub Downloader</h1>
  <p>Test version with visible output</p>
  
  <div id="status" class="status info" style="display:none;"></div>
  
  <label>GitHub URL:</label>
  <input type="text" id="url" placeholder="https://github.com/user/repo" value="">
  
  <button onclick="test()">🧪 TEST - Show Output</button>
  <button onclick="downloadRepo()">📥 Download</button>
  
  <h3>Debug Output:</h3>
  <div id="output" class="output">Loading...</div>
</div>

<script>
  const out = document.getElementById('output');
  const stat = document.getElementById('status');
  
  function log(msg) {
    console.log(msg);
    out.textContent += msg + '\n';
    out.scrollTop = out.scrollHeight;
  }
  
  function showStatus(msg, type) {
    stat.textContent = msg;
    stat.className = 'status ' + type;
    stat.style.display = 'block';
  }
  
  // Start
  log('=== APP STARTED ===');
  log('Time: ' + new Date().toLocaleString());
  log('');
  
  // Check Telegram
  if (window.Telegram) {
    log('✓ Telegram object exists');
    if (window.Telegram.WebApp) {
      log('✓ Telegram.WebApp exists');
      window.Telegram.WebApp.ready();
      log('✓ WebApp.ready() called');
    } else {
      log('✗ Telegram.WebApp is undefined');
    }
  } else {
    log('✗ Telegram is undefined');
  }
  
  // Check JSZip
  if (window.JSZip) {
    log('✓ JSZip loaded');
  } else {
    log('✗ JSZip not loaded');
  }
  
  log('');
  log('Ready to download!');
  log('');
  
  function test() {
    log('=== TEST CLICKED ===');
    log('URL input value: ' + document.getElementById('url').value);
    log('Test complete');
    showStatus('Test works!', 'success');
  }
  
  async function downloadRepo() {
    log('');
    log('=== DOWNLOAD STARTED ===');
    
    const url = document.getElementById('url').value.trim();
    log('URL: ' + url);
    
    if (!url) {
      log('✗ URL is empty');
      showStatus('Enter a URL', 'error');
      return;
    }
    
    // Parse URL
    let owner, repo;
    try {
      const u = new URL(url);
      const parts = u.pathname.split('/').filter(Boolean);
      owner = parts[0];
      repo = parts[1].replace(/\.git/i, '');
      log('✓ Parsed: ' + owner + '/' + repo);
    } catch (e) {
      log('✗ Invalid URL: ' + e.message);
      showStatus('Invalid URL format', 'error');
      return;
    }
    
    try {
      showStatus('Downloading...', 'info');
      
      // Fetch tree
      log('Fetching tree...');
      const treeUrl = `https://api.github.com/repos/${owner}/${repo}/git/trees/main?recursive=1`;
      log('Tree URL: ' + treeUrl);
      
      const treeRes = await fetch(treeUrl);
      log('Tree response: ' + treeRes.status + ' ' + treeRes.statusText);
      
      if (!treeRes.ok) {
        log('✗ Tree fetch failed');
        showStatus('Repository not found', 'error');
        return;
      }
      
      const treeData = await treeRes.json();
      const files = treeData.tree.filter(f => f.type === 'blob');
      log('✓ Found ' + files.length + ' files');
      
      if (files.length === 0) {
        log('✗ No files found');
        showStatus('No files to download', 'error');
        return;
      }
      
      // Download files
      log('Downloading ' + Math.min(5, files.length) + ' files (sample)...');
      const zip = new JSZip();
      let count = 0;
      
      for (let i = 0; i < Math.min(5, files.length); i++) {
        const f = files[i];
        try {
          const fileUrl = `https://raw.githubusercontent.com/${owner}/${repo}/main/${f.path}`;
          const fileRes = await fetch(fileUrl);
          if (fileRes.ok) {
            zip.file(f.path, await fileRes.blob());
            count++;
            log('  ✓ ' + f.path);
          }
        } catch (e) {
          log('  ✗ ' + f.path + ': ' + e.message);
        }
      }
      
      log('✓ Downloaded ' + count + ' files');
      
      // Create ZIP
      log('Creating ZIP...');
      const zipBlob = await zip.generateAsync({ type: 'blob' });
      const zipSize = (zipBlob.size / 1024 / 1024).toFixed(2);
      log('✓ ZIP created: ' + zipSize + 'MB');
      
      // Download
      log('Triggering download...');
      const url = URL.createObjectURL(zipBlob);
      const a = document.createElement('a');
      a.href = url;
      a.download = repo + '-sample.zip';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      
      log('✓ Download triggered!');
      showStatus('Download started! Check your files.', 'success');
      
    } catch (e) {
      log('✗ Error: ' + e.message);
      log(e.stack);
      showStatus('Error: ' + e.message, 'error');
    }
  }
</script>

</body>
</html>
