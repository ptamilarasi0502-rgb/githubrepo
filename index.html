<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Repo Downloader</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg: #ffffff;
      --secondary-bg: #f1f1f1;
      --text: #222222;
      --hint: #999999;
      --button: #2678b6;
      --success: #2ea043;
      --error: #cc2929;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
      display: flex;
      flex-direction: column;
    }

    .container { max-width: 100%; margin: 0 auto; }
    
    .header {
      text-align: center;
      margin-bottom: 24px;
      padding: 16px;
      background: var(--secondary-bg);
      border-radius: 12px;
    }

    .header h1 { font-size: 18px; margin-bottom: 4px; }
    .header p { font-size: 13px; color: var(--hint); }

    .card {
      background: var(--secondary-bg);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--hint);
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    input[type="text"],
    select {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--secondary-bg);
      border-radius: 6px;
      background: white;
      color: var(--text);
      font-size: 14px;
      margin-bottom: 8px;
      -webkit-appearance: none;
    }

    input[type="text"]:focus,
    select:focus {
      outline: none;
      border-color: var(--button);
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: var(--button);
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      transition: opacity 0.2s;
    }

    button:active {
      opacity: 0.85;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .success-btn {
      background: var(--success);
    }

    .error-btn {
      background: var(--error);
    }

    .status {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 13px;
      display: none;
    }

    .status.visible { display: block; }
    .status.success { background: #d4edda; color: #155724; }
    .status.error { background: #f8d7da; color: #721c24; }
    .status.info { background: #d1ecf1; color: #0c5460; }

    .progress {
      width: 100%;
      height: 4px;
      background: var(--secondary-bg);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 12px;
      display: none;
    }

    .progress.visible { display: block; }
    .progress-bar {
      height: 100%;
      background: var(--button);
      width: 0%;
      transition: width 0.3s;
    }

    .file-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: white;
      border-radius: 6px;
      font-size: 13px;
    }

    .file-item-info {
      flex: 1;
      min-width: 0;
    }

    .file-item-name {
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-item-size {
      font-size: 12px;
      color: var(--hint);
      margin-top: 2px;
    }

    .file-item button {
      padding: 6px 12px;
      margin: 0 2px;
      font-size: 12px;
      width: auto;
    }

    .hidden { display: none !important; }

    .debug {
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 8px;
      font-size: 11px;
      font-family: monospace;
      max-height: 150px;
      overflow-y: auto;
      margin-top: 12px;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .footer {
      margin-top: auto;
      padding-top: 16px;
      text-align: center;
      font-size: 12px;
      color: var(--hint);
    }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>📥 GitHub Downloader</h1>
    <p>Download repos as ZIP files</p>
  </div>

  <!-- Input Section -->
  <div class="card">
    <label>Repository URL</label>
    <input type="text" id="repoUrl" placeholder="https://github.com/user/repo">
  </div>

  <!-- Branch Selection -->
  <div class="card" id="branchCard" class="hidden">
    <label>Select Branch</label>
    <select id="branchSelect"><option>main</option></select>
  </div>

  <!-- Status Messages -->
  <div id="status" class="status"></div>
  <div id="progress" class="progress">
    <div id="progressBar" class="progress-bar"></div>
  </div>

  <!-- Download Button -->
  <button id="downloadBtn" onclick="startDownload()">📥 Download Repository</button>

  <!-- Download Options -->
  <div id="downloadOptions" class="card hidden">
    <label>Download Method</label>
    <button class="success-btn" onclick="downloadFileSaver()">💾 Save to Storage</button>
    <button onclick="downloadDirect()">📲 Direct Download</button>
  </div>

  <!-- Saved Files -->
  <div id="savedCard" class="card hidden">
    <label>💾 Saved Files</label>
    <div id="fileList" class="file-list"></div>
  </div>

  <!-- Debug Info -->
  <div id="debugInfo" class="debug"></div>

</div>

<div class="footer">
  Telegram Mini App • Download & Save
</div>

<script>
  // Debug logging
  const debugLog = (msg) => {
    const debug = document.getElementById('debugInfo');
    debug.textContent += new Date().toLocaleTimeString() + ' | ' + msg + '\n';
    debug.scrollTop = debug.scrollHeight;
    console.log(msg);
  };

  // Initialize Telegram
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    debugLog('✓ Telegram WebApp ready');
  } else {
    debugLog('⚠ Telegram WebApp not detected');
  }

  // Show status message
  const showStatus = (msg, type = 'info') => {
    const statusEl = document.getElementById('status');
    statusEl.textContent = msg;
    statusEl.className = `status visible ${type}`;
    debugLog(`[${type.toUpperCase()}] ${msg}`);
  };

  // Show progress
  const setProgress = (percent) => {
    const progressEl = document.getElementById('progress');
    const barEl = document.getElementById('progressBar');
    progressEl.classList.add('visible');
    barEl.style.width = Math.min(100, percent) + '%';
  };

  // State
  let currentZip = null;
  let currentFilename = null;
  let dbReady = false;

  // Init IndexedDB
  const initDB = () => {
    return new Promise((resolve) => {
      try {
        const req = indexedDB.open('GitDownloaderDB', 1);
        req.onerror = () => {
          debugLog('❌ IndexedDB failed');
          resolve(false);
        };
        req.onsuccess = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains('files')) {
            db.close();
            const req2 = indexedDB.open('GitDownloaderDB', 2);
            req2.onupgradeneeded = (e) => {
              e.target.result.createObjectStore('files', { keyPath: 'id', autoIncrement: true });
            };
            req2.onsuccess = () => {
              dbReady = true;
              debugLog('✓ IndexedDB ready');
              resolve(true);
            };
          } else {
            dbReady = true;
            debugLog('✓ IndexedDB ready');
            resolve(true);
          }
        };
      } catch (e) {
        debugLog('❌ IndexedDB error: ' + e.message);
        resolve(false);
      }
    });
  };

  // Load saved files
  const loadSavedFiles = () => {
    if (!dbReady) return;
    try {
      const req = indexedDB.open('GitDownloaderDB');
      req.onsuccess = () => {
        const db = req.result;
        const transaction = db.transaction(['files'], 'readonly');
        const store = transaction.objectStore('files');
        const getReq = store.getAll();
        
        getReq.onsuccess = () => {
          const files = getReq.result;
          const card = document.getElementById('savedCard');
          const list = document.getElementById('fileList');
          
          if (files.length === 0) {
            card.classList.add('hidden');
            return;
          }

          list.innerHTML = '';
          files.forEach((file, idx) => {
            const item = document.createElement('div');
            item.className = 'file-item';
            item.innerHTML = `
              <div class="file-item-info">
                <div class="file-item-name">${file.filename}</div>
                <div class="file-item-size">${(file.size / 1024 / 1024).toFixed(1)}MB</div>
              </div>
              <div>
                <button onclick="downloadFromDB(${idx})">Download</button>
                <button class="error-btn" onclick="deleteFromDB(${idx})">Delete</button>
              </div>
            `;
            list.appendChild(item);
          });
          card.classList.remove('hidden');
        };
      };
    } catch (e) {
      debugLog('❌ Load files error: ' + e.message);
    }
  };

  // Save to IndexedDB
  const saveToIndexedDB = (filename, blob) => {
    return new Promise((resolve) => {
      if (!dbReady) { resolve(false); return; }
      try {
        const req = indexedDB.open('GitDownloaderDB');
        req.onsuccess = () => {
          const db = req.result;
          const transaction = db.transaction(['files'], 'readwrite');
          const store = transaction.objectStore('files');
          store.add({
            filename,
            blob,
            size: blob.size,
            timestamp: Date.now()
          });
          resolve(true);
        };
      } catch (e) {
        debugLog('❌ Save to DB error: ' + e.message);
        resolve(false);
      }
    });
  };

  // Download from IndexedDB
  const downloadFromDB = (index) => {
    try {
      const req = indexedDB.open('GitDownloaderDB');
      req.onsuccess = () => {
        const db = req.result;
        const transaction = db.transaction(['files'], 'readonly');
        const store = transaction.objectStore('files');
        const getReq = store.getAll();
        
        getReq.onsuccess = () => {
          const file = getReq.result[index];
          if (file) {
            triggerDownload(file.blob, file.filename);
          }
        };
      };
    } catch (e) {
      debugLog('❌ Download from DB error: ' + e.message);
    }
  };

  // Delete from IndexedDB
  const deleteFromDB = (index) => {
    try {
      const req = indexedDB.open('GitDownloaderDB');
      req.onsuccess = () => {
        const db = req.result;
        const transaction = db.transaction(['files'], 'readwrite');
        const store = transaction.objectStore('files');
        const getReq = store.getAll();
        
        getReq.onsuccess = () => {
          const files = getReq.result;
          if (files[index]) {
            store.delete(files[index].id);
            loadSavedFiles();
          }
        };
      };
    } catch (e) {
      debugLog('❌ Delete error: ' + e.message);
    }
  };

  // Trigger download
  const triggerDownload = (blob, filename) => {
    try {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 100);
      showStatus('✓ Downloaded: ' + filename, 'success');
      debugLog('✓ Download triggered: ' + filename);
    } catch (e) {
      debugLog('❌ Trigger download error: ' + e.message);
      showStatus('Error: ' + e.message, 'error');
    }
  };

  // Download methods
  const downloadFileSaver = async () => {
    if (!currentZip) return;
    try {
      showStatus('Saving to storage...', 'info');
      const saved = await saveToIndexedDB(currentFilename, currentZip);
      if (saved) {
        showStatus('✓ Saved successfully!', 'success');
        loadSavedFiles();
        await new Promise(r => setTimeout(r, 1000));
        document.getElementById('downloadOptions').classList.add('hidden');
        document.getElementById('downloadBtn').style.display = '';
      }
    } catch (e) {
      showStatus('Error: ' + e.message, 'error');
    }
  };

  const downloadDirect = () => {
    if (!currentZip) return;
    try {
      triggerDownload(currentZip, currentFilename);
    } catch (e) {
      showStatus('Error: ' + e.message, 'error');
    }
  };

  // Parse GitHub URL
  const parseGitHubUrl = (url) => {
    try {
      const u = new URL(url);
      const parts = u.pathname.split('/').filter(Boolean);
      if (parts.length < 2) return null;
      return { owner: parts[0], repo: parts[1].replace(/\.git$/i, '') };
    } catch {
      return null;
    }
  };

  // Fetch branches
  const fetchBranches = async (owner, repo) => {
    try {
      debugLog(`Fetching branches for ${owner}/${repo}...`);
      const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/branches?per_page=50`);
      if (!res.ok) throw new Error('Failed to fetch branches');
      const branches = await res.json();
      const select = document.getElementById('branchSelect');
      select.innerHTML = '';
      branches.forEach(b => {
        const opt = document.createElement('option');
        opt.value = b.name;
        opt.textContent = b.name;
        select.appendChild(opt);
      });
      document.getElementById('branchCard').classList.remove('hidden');
      debugLog(`✓ Fetched ${branches.length} branches`);
    } catch (e) {
      debugLog('⚠ Branch fetch failed: ' + e.message);
    }
  };

  // Repo URL input
  document.getElementById('repoUrl').addEventListener('input', (e) => {
    const parsed = parseGitHubUrl(e.target.value);
    if (parsed) {
      fetchBranches(parsed.owner, parsed.repo);
    } else {
      document.getElementById('branchCard').classList.add('hidden');
    }
  });

  // Start download
  const startDownload = async () => {
    const url = document.getElementById('repoUrl').value.trim();
    const parsed = parseGitHubUrl(url);

    if (!parsed) {
      showStatus('Invalid GitHub URL', 'error');
      return;
    }

    const branch = document.getElementById('branchSelect').value || 'main';
    const { owner, repo } = parsed;

    try {
      document.getElementById('downloadBtn').disabled = true;
      document.getElementById('downloadOptions').classList.add('hidden');

      showStatus('Fetching repository...', 'info');
      setProgress(10);
      debugLog(`Downloading ${owner}/${repo}@${branch}...`);

      // Fetch tree
      const treeRes = await fetch(
        `https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`
      );
      if (!treeRes.ok) throw new Error('Repository not found or private');

      const treeData = await treeRes.json();
      const files = treeData.tree.filter(f => f.type === 'blob');
      if (files.length === 0) throw new Error('No files found');

      showStatus(`Fetching ${files.length} files...`, 'info');
      setProgress(20);
      debugLog(`Found ${files.length} files`);

      const zip = new JSZip();
      let fetched = 0;

      // Fetch files in batches
      for (let i = 0; i < files.length; i += 5) {
        const batch = files.slice(i, i + 5);
        await Promise.all(batch.map(async (f) => {
          try {
            const fileRes = await fetch(
              `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${f.path}`
            );
            if (fileRes.ok) {
              zip.file(`${repo}/${f.path}`, await fileRes.blob());
            }
          } catch (e) {
            debugLog(`⚠ Failed to fetch ${f.path}`);
          }
          fetched++;
          setProgress(20 + Math.round((fetched / files.length) * 60));
        }));
      }

      showStatus('Creating ZIP...', 'info');
      setProgress(85);

      const zipBlob = await zip.generateAsync({ type: 'blob' });
      
      showStatus('Done! Choose download method.', 'success');
      setProgress(100);

      currentZip = zipBlob;
      currentFilename = `${repo}-${branch}.zip`;

      debugLog(`✓ ZIP created: ${(zipBlob.size / 1024 / 1024).toFixed(1)}MB`);

      document.getElementById('downloadBtn').style.display = 'none';
      document.getElementById('downloadOptions').classList.remove('hidden');

    } catch (e) {
      showStatus('Error: ' + e.message, 'error');
      debugLog('❌ ' + e.message);
    } finally {
      document.getElementById('downloadBtn').disabled = false;
    }
  };

  // Initialize
  window.addEventListener('load', async () => {
    debugLog('🚀 App starting...');
    await initDB();
    loadSavedFiles();
  });
</script>

</body>
</html>
